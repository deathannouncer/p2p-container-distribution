apiVersion: v1
kind: Service
metadata:
  name: p2pcd
  labels:
    app: p2pcd
spec:
  clusterIP: None # headless -- gives each pod a stable DNS name, required
  # for nodes to address each other directly (p2pcd-0.p2pcd.<ns>.svc...).
  selector:
    app: p2pcd
  ports:
    - name: http
      port: 8080
      targetPort: 8080
